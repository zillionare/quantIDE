[tox]
isolated_build = true
envlist = py313, lint

[gh-actions]
python =
    3.13: py313

[testenv:lint]
extras =
    dev
    doc
deps =
    poetry
commands =
    poetry run isort quantide
    poetry run black quantide tests
    poetry run flake8 quantide
    poetry run mypy -m quantide --exclude ^tests
    poetry build
    poetry run mkdocs build
    poetry run twine check dist/*

[testenv]
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
deps =
    poetry
extras =
    test
commands =
    poetry run pytest -s --cov=quantide --cov-append --cov-report=xml --cov-report term-missing tests
