<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>账号管理 - 匡醍</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/franken-ui@2.0.0/dist/css/core.min.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/franken-ui@2.0.0/dist/js/core.iife.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script>
        tailwind.config = {
            darkMode: 'selector',
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <!-- 页面容器：最大宽度1400px -->
    <div class="max-w-[1400px] mx-auto">
        <!-- Header -->
        <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 h-16 sticky top-0 z-50">
            <div class="h-full flex items-center justify-between px-4">
                <!-- Logo + Brand -->
                <div class="flex items-center space-x-3">
                    <img src="/static/logo.png" alt="Logo" class="h-8 w-8 rounded">
                    <span class="text-xl font-bold text-gray-900 dark:text-white">匡醍</span>
                </div>

                <!-- 右侧区域：导航 + 图标 + 用户 -->
                <div class="flex items-center space-x-6">
                    <!-- 一级导航 -->
                    <nav class="flex items-center space-x-1">
                        <a href="home.html" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium">
                            首页
                        </a>
                        <a href="#" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium">
                            交易
                        </a>
                        <a href="#" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium">
                            行情
                        </a>
                        <a href="strategy-list.html" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium">
                            策略
                        </a>
                        <a href="#" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium">
                            分析
                        </a>
                        <a href="#" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium">
                            资讯
                        </a>
                    </nav>

                    <!-- 通知图标 -->
                    <button class="relative p-2 text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                        <span class="absolute top-1 right-1 h-2 w-2 bg-red-500 rounded-full"></span>
                    </button>

                    <!-- 用户头像 + 账号选择 -->
                    <div class="flex items-center">
                        <div class="relative" id="user-menu">
                            <button onclick="toggleUserMenu()" class="flex items-center space-x-2 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                                <div class="h-8 w-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-medium">
                                    张
                                </div>
                                <span class="text-sm text-gray-700 dark:text-gray-300">张三</span>
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </button>
                            <!-- 下拉菜单 -->
                            <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-72 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 z-50">
                                <div class="p-3 border-b border-gray-200 dark:border-gray-700">
                                    <div class="text-xs text-gray-500 dark:text-gray-400 mb-2">当前账号</div>
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center space-x-2">
                                            <span class="text-yellow-500">★</span>
                                            <span class="text-sm font-medium text-gray-900 dark:text-white">华泰证券(实盘)</span>
                                        </div>
                                        <span class="text-xs text-green-500">已连接</span>
                                    </div>
                                </div>
                                <div class="p-2 border-b border-gray-200 dark:border-gray-700">
                                    <div class="text-xs text-gray-500 dark:text-gray-400 px-2 py-1">切换账号</div>
                                    <button onclick="switchAccount('sim1')" class="w-full flex items-center space-x-2 px-2 py-2 text-left hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                                        <span class="text-sm text-gray-700 dark:text-gray-300">仿真账号A</span>
                                        <span class="text-xs text-gray-400">仿真</span>
                                    </button>
                                    <button onclick="switchAccount('sim2')" class="w-full flex items-center space-x-2 px-2 py-2 text-left hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                                        <span class="text-sm text-gray-700 dark:text-gray-300">仿真账号B</span>
                                        <span class="text-xs text-gray-400">仿真</span>
                                    </button>
                                </div>
                                <div class="p-2">
                                    <a href="#" class="block px-2 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">账号管理</a>
                                    <a href="#" class="block px-2 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">退出登录</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <script>
                    function toggleUserMenu() {
                        const dropdown = document.getElementById('user-dropdown');
                        dropdown.classList.toggle('hidden');
                    }
                    function switchAccount(accountId) {
                        console.log('切换账号:', accountId);
                        document.getElementById('user-dropdown').classList.add('hidden');
                    }
                    document.addEventListener('click', function(e) {
                        const menu = document.getElementById('user-menu');
                        const dropdown = document.getElementById('user-dropdown');
                        if (!menu.contains(e.target)) {
                            dropdown.classList.add('hidden');
                        }
                    });
                    </script>
                </div>
            </div>
        </header>

        <!-- 主容器 -->
        <div class="flex">
            <!-- Sidebar -->
            <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 fixed left-0 top-16 bottom-0 overflow-y-auto">
                <div class="p-4">
                    <!-- 二级菜单 -->
                    <nav class="space-y-1">
                        <!-- 菜单项 1 -->
                        <div>
                            <button class="w-full flex items-center justify-between px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                                <div class="flex items-center space-x-3">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                                    </svg>
                                    <span>概览</span>
                                </div>
                            </button>
                        </div>

                        <!-- 菜单项 2 - 下单 -->
                        <div>
                            <button class="w-full flex items-center justify-between px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                                <div class="flex items-center space-x-3">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                                    </svg>
                                    <span>下单</span>
                                </div>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </button>
                            <!-- 子菜单 -->
                            <div class="ml-8 mt-1 space-y-1">
                                <a href="livetrade-default.html" class="block px-3 py-2 text-sm text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400">
                                    闪电交易
                                </a>
                            </div>
                        </div>

                        <!-- 菜单项 3 - 账号管理 -->
                        <div>
                            <button class="w-full flex items-center justify-between px-3 py-2 bg-blue-50 dark:bg-blue-900 text-blue-700 dark:text-blue-300 rounded-lg">
                                <div class="flex items-center space-x-3">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                                    </svg>
                                    <span>账号管理</span>
                                </div>
                            </button>
                        </div>

                        <!-- 菜单项 4 -->
                        <div>
                            <button class="w-full flex items-center justify-between px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                                <div class="flex items-center space-x-3">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                    </svg>
                                    <span>交易记录</span>
                                </div>
                            </button>
                        </div>

                        <!-- 菜单项 5 -->
                        <div>
                            <button class="w-full flex items-center justify-between px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                                <div class="flex items-center space-x-3">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    </svg>
                                    <span>系统设置</span>
                                </div>
                            </button>
                        </div>
                    </nav>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 ml-64 p-6">
                <!-- 面包屑导航 -->
                <div class="mb-4">
                    <nav class="flex items-center space-x-2 text-sm text-gray-600 dark:text-gray-400">
                        <a href="home.html" class="hover:text-blue-600 dark:hover:text-blue-400">首页</a>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                        <span class="text-gray-900 dark:text-white font-medium">账号管理</span>
                    </nav>
                </div>

                <!-- 页面标题 -->
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">账号管理</h1>
                    <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">管理您的实盘账号和仿真账号</p>
                </div>

                <!-- 实盘账号区域 -->

                    <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">

                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>

                                            <span class="font-medium text-gray-900 dark:text-white">华泰证券</span>
                                        </div>
                                        <div class="text-sm text-gray-500 dark:text-gray-400">账号: 1234567890</div>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-4">
                                    <div class="text-right">
                                        <div class="text-xs text-gray-500 dark:text-gray-400">创建时间</div>
                                        <div class="text-sm text-gray-900 dark:text-white">2024-01-15</div>
                                    </div>
                                    <div class="px-3 py-1 bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300 rounded-full text-sm">
                                        已连接
                                    </div>
                                    <button class="px-3 py-1.5 text-sm text-red-600 dark:text-red-400 border border-red-600 dark:border-red-400 rounded-lg hover:bg-red-50 dark:hover:bg-red-900">
                                        删除

                                    <button class="px-3 py-1.5 text-sm text-blue-600 dark:text-blue-400 border border-blue-600 dark:border-blue-400 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-900">
                                        刷新
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 配置新账号按钮 -->
                        <div class="mt-4">
                            <button class="flex items-center space-x-2 px-4 py-2 text-sm text-blue-600 dark:text-blue-400 border border-dashed border-blue-600 dark:border-blue-400 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-900">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                </svg>
                                <span>配置新实盘账号</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 仿真账号区域 -->
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow">
                    <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">仿真账号</h2>
                        <button class="px-3 py-1.5 text-sm text-red-600 dark:text-red-400 border border-red-600 dark:border-red-400 rounded-lg hover:bg-red-50 dark:hover:bg-red-900">
                            清空所有仿真账号
                        </button>
                    </div>
                    <div class="p-6">
                        <!-- 仿真账号列表 -->
                        <div class="space-y-4">
                            <!-- 仿真账号 A -->
                            <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center space-x-4">
                                        <div class="h-12 w-12 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center">
                                            <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                                            </svg>
                                        </div>
                                        <div>
                                            <div class="font-medium text-gray-900 dark:text-white">仿真账号A</div>
                                            <div class="text-sm text-gray-500 dark:text-gray-400">创建时间: 2024-02-01</div>
                                        </div>
                                    </div>
                                    <div class="flex items-center space-x-6">
                                        <div class="text-right">
                                            <div class="text-xs text-gray-500 dark:text-gray-400">初始资金</div>
                                            <div class="text-sm font-medium text-gray-900 dark:text-white">100.00万</div>
                                        </div>
                                        <div class="text-right">
                                            <div class="text-xs text-gray-500 dark:text-gray-400">当前资金</div>
                                            <div class="text-sm font-medium text-green-600 dark:text-green-400">125.60万</div>
                                        </div>
                                        <button class="px-3 py-1.5 text-sm text-red-600 dark:text-red-400 border border-red-600 dark:border-red-400 rounded-lg hover:bg-red-50 dark:hover:bg-red-900">
                                            删除
                                        </button>
                                        <button class="px-3 py-1.5 text-sm text-orange-600 dark:text-orange-400 border border-orange-600 dark:border-orange-400 rounded-lg hover:bg-orange-50 dark:hover:bg-orange-900">
                                            重置
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- 仿真账号 B -->
                            <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center space-x-4">
                                        <div class="h-12 w-12 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center">
                                            <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                                            </svg>
                                        </div>
                                        <div>
                                            <div class="font-medium text-gray-900 dark:text-white">仿真账号B</div>

                                        </div>
                                    </div>
                                    <div class="flex items-center space-x-6">
                                        <div class="text-right">
                                            <div class="text-xs text-gray-500 dark:text-gray-400">初始资金</div>
                                            <div class="text-sm font-medium text-gray-900 dark:text-white">50.00万</div>
                                        </div>
                                        <div class="text-right">
                                            <div class="text-xs text-gray-500 dark:text-gray-400">当前资金</div>
                                            <div class="text-sm font-medium text-red-600 dark:text-red-400">48.20万</div>
                                        </div>
                                        <button class="px-3 py-1.5 text-sm text-red-600 dark:text-red-400 border border-red-600 dark:border-red-400 rounded-lg hover:bg-red-50 dark:hover:bg-red-900">
                                            删除
                                        </button>
                                        <button class="px-3 py-1.5 text-sm text-orange-600 dark:text-orange-400 border border-orange-600 dark:border-orange-400 rounded-lg hover:bg-orange-50 dark:hover:bg-orange-900">

                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 新建仿真账号按钮 -->
                        <div class="mt-4">
                            <button class="flex items-center space-x-2 px-4 py-2 text-sm text-blue-600 dark:text-blue-400 border border-dashed border-blue-600 dark:border-blue-400 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-900">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                </svg>
                                <span>新建仿真账号</span>
                            </button>
                        </div>
